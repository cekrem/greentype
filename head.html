<script>
  (() => {
    const PACK = "cherrymx-blue-abs";
    const CONFIG_URL = `${PACK}/config.json`;
    const SOUND_URL = `${PACK}/sound.ogg`;

    const FALLBACK_CHAR = 97; // 'a'

    // Unicode code point -> Mechvibes scan code (the keys in config.json).
    // Uppercase letters share scan codes with their lowercase counterparts;
    // shifted symbols share the unshifted key's scan code.
    // Used once at init to rekey `defines` from scan codes to char codes.
    const CHAR_TO_SCAN = {
      97: 30,
      98: 48,
      99: 46,
      100: 32,
      101: 18,
      102: 33,
      103: 34,
      104: 35,
      105: 23,
      106: 36,
      107: 37,
      108: 38,
      109: 50,
      110: 49,
      111: 24,
      112: 25,
      113: 16,
      114: 19,
      115: 31,
      116: 20,
      117: 22,
      118: 47,
      119: 17,
      120: 45,
      121: 21,
      122: 44,
      48: 11,
      49: 2,
      50: 3,
      51: 4,
      52: 5,
      53: 6,
      54: 7,
      55: 8,
      56: 9,
      57: 10,
      32: 57,
      95: 57,
      8629: 28,
      39: 40,
      44: 51,
      45: 12,
      46: 52,
      47: 53,
      59: 39,
      61: 13,
      91: 26,
      92: 43,
      93: 27,
      96: 41,
      33: 2,
      64: 3,
      35: 4,
      36: 5,
      37: 6,
      94: 7,
      38: 8,
      42: 9,
      40: 10,
      41: 11,
      43: 13,
      58: 39,
      34: 40,
      60: 51,
      62: 52,
      63: 53,
      123: 26,
      124: 43,
      125: 27,
      126: 41,
    };
    for (let c = 65; c <= 90; c++) CHAR_TO_SCAN[c] = CHAR_TO_SCAN[c + 32];

    let ctx = null;
    let buffer = null;
    let defines = null;
    let ready = false;
    let initPromise = null;

    function init() {
      if (initPromise) return initPromise;
      initPromise = (async () => {
        const [cfg, audio] = await Promise.all([
          fetch(CONFIG_URL).then((r) => r.json()),
          fetch(SOUND_URL).then((r) => r.arrayBuffer()),
        ]);
        defines = {};
        for (const [charCode, scan] of Object.entries(CHAR_TO_SCAN)) {
          const slice = cfg.defines[scan];
          if (slice) defines[charCode] = slice;
        }
        ctx = new (window.AudioContext || window.webkitAudioContext)();
        buffer = await ctx.decodeAudioData(audio);
        ready = true;
      })().catch((e) => console.error("thock init failed:", e));
      return initPromise;
    }

    function play(charCode) {
      if (!ready) return;
      if (ctx.state === "suspended") ctx.resume();

      const slice = defines[charCode] || defines[FALLBACK_CHAR];
      if (!slice) return;
      const [offsetMs, durationMs] = slice;

      const src = ctx.createBufferSource();
      src.buffer = buffer;
      src.detune.value = Math.random() * 48 - 24;
      src.connect(ctx.destination);
      src.onended = () => src.disconnect();
      src.start(0, offsetMs / 1000, durationMs / 1000);
    }

    customElements.define(
      "thock-trigger",
      class extends HTMLElement {
        static get observedAttributes() {
          return ["seq"];
        }
        connectedCallback() {
          init();
        }
        attributeChangedCallback(name, oldVal, newVal) {
          if (name !== "seq" || newVal === null || newVal === oldVal) return;
          play(this.getAttribute("code"));
        }
      },
    );
  })();
</script>
